image:
  repository: kanei0415/ktcloud-msa-product-service
  tag: a1d979b214dcd58d0baa269a481534657959b4c8
  pullPolicy: IfNotPresent

service:
  type: ClusterIP

externalSecret:
  enabled: true
  targetName: product-service-secrets
  awsSecretName: kt-cloud-cluster/product-service
  keys:
    - secretKey: password
      property: DB_PASSWORD
    - secretKey: postgres-password
      property: DB_PASSWORD

redis:
  enabled: false

# CloudNativePG HA cluster (1 primary + 2 replicas), managed by the
# cnpg-operator. The chart renders the postgresql.cnpg.io/v1 Cluster and a
# basic-auth ExternalSecret it bootstraps from. App connects via product-postgres-rw.
cnpg:
  enabled: true
  name: product-postgres
  database: product_db
  owner: product-service
  instances: 3

appConfig:
  spring:
    application:
      name: product-service
    datasource:
      url: jdbc:postgresql://product-postgres-rw:5432/product_db?sslmode=disable
      username: product-service
      password: ${DB_PASSWORD}
      driver-class-name: org.postgresql.Driver
    jpa:
      database-platform: org.hibernate.dialect.PostgreSQLDialect
      hibernate:
        ddl-auto: create
      generate-ddl: true
      show-sql: true
  server:
    port: 8080
  grpc:
    server:
      port: 9090
  management:
    endpoints:
      web:
        base-path: /
        exposure:
          include: health,info,prometheus,metrics
        path-mapping:
          health: healthz
    endpoint:
      health:
        show-details: always
        probes:
          enabled: true
        group:
          readiness:
            include: readinessState,db
    prometheus:
      metrics:
        export:
          enabled: true
    metrics:
      tags:
        application: product-service
      distribution:
        percentiles-histogram:
          http.server.requests: true
        slo:
          http.server.requests: 100ms,500ms,1s,2s

image:
  repository: kanei0415/ktcloud-msa-inventory-service
  tag: f8fed3ea69de9cc2cb7972cc3f0f6ca3ecaf6b40
  pullPolicy: IfNotPresent

service:
  type: ClusterIP

# -----------------------------------------------------------------------------
# Event-driven autoscaling. Inventory is the saga consumer of
# inventory-reserve-request-topic; when reservation events back up (consumer
# lag), KEDA scales it out. A cron trigger pre-warms replicas during the
# evening peak. KEDA owns the HPA, so the CPU HPA is disabled here.
# -----------------------------------------------------------------------------
autoscaling:
  enabled: false

keda:
  enabled: true
  minReplicaCount: 2
  maxReplicaCount: 12
  cooldownPeriod: 120
  pollingInterval: 15
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: kafka-kafka-bootstrap.kafka.svc.cluster.local:9092
        consumerGroup: inventory-service-group
        topic: inventory-reserve-request-topic
        lagThreshold: "50"
        offsetResetPolicy: earliest
    # CPU fallback so a non-Kafka load spike still scales the service.
    - type: cpu
      metricType: Utilization
      metadata:
        value: "70"
    # Scheduled pre-warm for the evening peak (Asia/Seoul 20:00-23:00).
    - type: cron
      metadata:
        timezone: Asia/Seoul
        start: "0 20 * * *"
        end: "0 23 * * *"
        desiredReplicas: "4"

externalSecret:
  enabled: true
  targetName: inventory-service-secrets
  awsSecretName: kt-cloud-cluster/inventory-service
  keys:
    - secretKey: password
      property: DB_PASSWORD
    - secretKey: postgres-password
      property: DB_PASSWORD
    - secretKey: redis-password
      property: REDIS_PASSWORD

postgresql:
  enabled: true
  fullnameOverride: inventory-postgres
  architecture: standalone
  global:
    security:
      allowInsecureImages: true
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
    tag: "16"
  auth:
    username: inventory-service
    database: inventory_db
    existingSecret: inventory-service-secrets
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: password
  primary:
    persistence:
      enabled: true
      storageClass: ebs-sc
      size: 5Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi

redis:
  enabled: true
  fullnameOverride: inventory-redis
  architecture: standalone
  global:
    security:
      allowInsecureImages: true
  image:
    registry: docker.io
    repository: bitnamilegacy/redis
    tag: "7.4"
  auth:
    enabled: true
    existingSecret: inventory-service-secrets
    existingSecretPasswordKey: redis-password
  master:
    persistence:
      enabled: true
      storageClass: ebs-sc
      size: 2Gi

appConfig:
  spring:
    application:
      name: inventory-service
    datasource:
      url: jdbc:postgresql://inventory-postgres:5432/inventory_db?sslmode=disable
      username: inventory-service
      password: ${DB_PASSWORD}
      driver-class-name: org.postgresql.Driver
    jpa:
      database-platform: org.hibernate.dialect.PostgreSQLDialect
      hibernate:
        ddl-auto: create
      generate-ddl: true
      show-sql: true
    data:
      redis:
        host: inventory-redis-master
        port: 6379
        password: ${REDIS_PASSWORD}
    kafka:
      bootstrap-servers: kafka-kafka-bootstrap.kafka.svc.cluster.local:9092
      consumer:
        group-id: inventory-service-group
        auto-offset-reset: earliest
        key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
        value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      producer:
        key-serializer: org.apache.kafka.common.serialization.StringSerializer
        value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      topic:
        inventory-reserved-result: inventory-reserved-result-topic
        inventory-reserve-request: inventory-reserve-request-topic
  server:
    port: 8080
  grpc:
    server:
      port: 9090
  management:
    endpoints:
      web:
        base-path: /
        exposure:
          include: health,info,prometheus,metrics
        path-mapping:
          health: healthz
    endpoint:
      health:
        show-details: always
        probes:
          enabled: true
        # Readiness gates on DB + Redis but NOT Kafka — the saga is async, so a
        # transient broker hiccup must not pull the pod out of rotation.
        group:
          readiness:
            include: readinessState,db,redis
    prometheus:
      metrics:
        export:
          enabled: true
    metrics:
      tags:
        application: inventory-service
      distribution:
        percentiles-histogram:
          http.server.requests: true
        slo:
          http.server.requests: 100ms,500ms,1s,2s

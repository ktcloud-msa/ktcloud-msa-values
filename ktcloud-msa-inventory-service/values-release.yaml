image:
  repository: kanei0415/ktcloud-msa-inventory-service
  tag: 6f0f450f7172d3d0c7b2d1397051226e1290a0f8
  pullPolicy: IfNotPresent

service:
  type: ClusterIP

externalSecret:
  enabled: true
  targetName: inventory-service-secrets
  awsSecretName: kt-cloud-cluster/inventory-service
  keys:
    - secretKey: password
      property: DB_PASSWORD
    - secretKey: postgres-password
      property: DB_PASSWORD
    - secretKey: redis-password
      property: REDIS_PASSWORD

postgresql:
  enabled: true
  fullnameOverride: inventory-postgres
  architecture: standalone
  global:
    security:
      allowInsecureImages: true
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
    tag: 17.6.0-debian-12-r0
  auth:
    username: inventory-service
    database: inventory_db
    existingSecret: inventory-service-secrets
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: password
  primary:
    persistence:
      enabled: true
      storageClass: ebs-sc
      size: 5Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi

redis:
  enabled: true
  fullnameOverride: inventory-redis
  architecture: standalone
  global:
    security:
      allowInsecureImages: true
  image:
    registry: docker.io
    repository: bitnamilegacy/redis
    tag: 8.2.1-debian-12-r0
  auth:
    enabled: true
    existingSecret: inventory-service-secrets
    existingSecretPasswordKey: redis-password
  master:
    persistence:
      enabled: true
      storageClass: ebs-sc
      size: 2Gi

appConfig:
  spring:
    application:
      name: inventory-service
    datasource:
      url: jdbc:postgresql://inventory-postgres:5432/inventory_db?sslmode=disable
      username: inventory-service
      password: ${DB_PASSWORD}
      driver-class-name: org.postgresql.Driver
    jpa:
      database-platform: org.hibernate.dialect.PostgreSQLDialect
      hibernate:
        ddl-auto: create
      generate-ddl: true
      show-sql: true
    data:
      redis:
        host: inventory-redis-master
        port: 6379
        password: ${REDIS_PASSWORD}
    kafka:
      bootstrap-servers: kafka-kafka-bootstrap.kafka.svc.cluster.local:9092
      consumer:
        group-id: inventory-service-group
        auto-offset-reset: earliest
        key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
        value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      producer:
        key-serializer: org.apache.kafka.common.serialization.StringSerializer
        value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      topic:
        inventory-reserved-result: inventory-reserved-result-topic
        inventory-reserve-request: inventory-reserve-request-topic
  server:
    port: 8080
  grpc:
    server:
      port: 9090
  management:
    endpoints:
      web:
        base-path: /
        path-mapping:
          health: healthz
    endpoint:
      health:
        show-details: always

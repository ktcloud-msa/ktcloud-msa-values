image:
  repository: kanei0415/ktcloud-msa-auth-service
  tag: 3461551d96b9675088d354dea21be265fec53d2a
  pullPolicy: IfNotPresent

service:
  type: ClusterIP

externalSecret:
  enabled: true
  targetName: auth-service-secrets
  awsSecretName: kt-cloud-cluster/auth-service
  keys:
    - secretKey: password
      property: DB_PASSWORD
    - secretKey: postgres-password
      property: DB_PASSWORD
    - secretKey: redis-password
      property: REDIS_PASSWORD

# Strong JWT_SECRET injected via a chart-managed Secret that overrides the
# placeholder JWT_SECRET coming from AWS SM via ESO. Must match the value in
# user-api-gateway so issued and validated tokens line up.
jwtSecret: pNiKW9c2Z8E5dFmYqRtVgXz3uIoBnH7lTaJkSh1xPyMr46WvUe

postgresql:
  enabled: true
  fullnameOverride: auth-postgres
  architecture: standalone
  global:
    security:
      allowInsecureImages: true
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
    tag: "16"
  auth:
    username: auth-service
    database: auth_db
    existingSecret: auth-service-secrets
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: password
  primary:
    persistence:
      enabled: true
      storageClass: ebs-sc
      size: 5Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi

redis:
  enabled: true
  fullnameOverride: auth-redis
  architecture: standalone
  global:
    security:
      allowInsecureImages: true
  image:
    registry: docker.io
    repository: bitnamilegacy/redis
    tag: "7.4"
  auth:
    enabled: true
    existingSecret: auth-service-secrets
    existingSecretPasswordKey: redis-password
  master:
    persistence:
      enabled: true
      storageClass: ebs-sc
      size: 2Gi

appConfig:
  spring:
    application:
      name: auth-service
    datasource:
      url: jdbc:postgresql://auth-postgres:5432/auth_db?sslmode=disable
      username: auth-service
      password: ${DB_PASSWORD}
      driver-class-name: org.postgresql.Driver
    jpa:
      database-platform: org.hibernate.dialect.PostgreSQLDialect
      hibernate:
        ddl-auto: create
      generate-ddl: true
      show-sql: true
    data:
      redis:
        host: auth-redis-master
        port: 6379
        password: ${REDIS_PASSWORD}
  jwt:
    secret: ${JWT_SECRET}
  server:
    port: 8080
  grpc:
    server:
      port: 9090
  management:
    endpoints:
      web:
        base-path: /
        path-mapping:
          health: healthz
    endpoint:
      health:
        show-details: always

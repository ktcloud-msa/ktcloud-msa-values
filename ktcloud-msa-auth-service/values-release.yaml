image:
  repository: kanei0415/ktcloud-msa-auth-service
  tag: 0ce5c7c9f40215bad1b2bf6bf3b3bcd01d3d2300
  pullPolicy: IfNotPresent

service:
  type: ClusterIP

externalSecret:
  # Disabled: AWS Secrets Manager stores literal "CHANGE_ME_*" placeholders
  # which makes JWT_SECRET too short for HS256. auth-service-secrets is
  # populated manually in-cluster instead. Re-enable once SM is seeded.
  enabled: false
  targetName: auth-service-secrets
  awsSecretName: kt-cloud-cluster/auth-service

postgresql:
  enabled: true
  fullnameOverride: auth-postgres
  architecture: standalone
  global:
    security:
      allowInsecureImages: true
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
    tag: 17.6.0-debian-12-r0
  auth:
    username: auth-service
    database: auth_db
    existingSecret: auth-service-secrets
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: password
  primary:
    persistence:
      enabled: true
      storageClass: ebs-sc
      size: 5Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi

redis:
  enabled: true
  fullnameOverride: auth-redis
  architecture: standalone
  global:
    security:
      allowInsecureImages: true
  image:
    registry: docker.io
    repository: bitnamilegacy/redis
    tag: 8.2.1-debian-12-r0
  auth:
    enabled: true
    existingSecret: auth-service-secrets
    existingSecretPasswordKey: redis-password
  master:
    persistence:
      enabled: true
      storageClass: ebs-sc
      size: 2Gi

appConfig:
  spring:
    application:
      name: auth-service
    datasource:
      url: jdbc:postgresql://auth-postgres:5432/auth_db
      username: auth-service
      password: ${DB_PASSWORD}
      driver-class-name: org.postgresql.Driver
    jpa:
      database-platform: org.hibernate.dialect.PostgreSQLDialect
      hibernate:
        ddl-auto: create
      generate-ddl: true
      show-sql: true
    data:
      redis:
        host: auth-redis-master
        port: 6379
        password: ${REDIS_PASSWORD}
  jwt:
    secret: ${JWT_SECRET}
  server:
    port: 8080
  grpc:
    server:
      port: 9090
  management:
    endpoints:
      web:
        base-path: /
        path-mapping:
          health: healthz
    endpoint:
      health:
        show-details: always

image:
  repository: kanei0415/ktcloud-msa-order-service
  tag: a312007b1ec6df677c275ea1657d399242dd24f5
  pullPolicy: IfNotPresent

service:
  type: ClusterIP

# -----------------------------------------------------------------------------
# Order is the saga orchestrator and consumes inventory-reserved-result-topic,
# so it scales on that consumer lag via KEDA (HPA disabled below).
# -----------------------------------------------------------------------------
autoscaling:
  enabled: false

keda:
  enabled: true
  minReplicaCount: 2
  maxReplicaCount: 10
  cooldownPeriod: 120
  pollingInterval: 15
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: kafka-kafka-bootstrap.kafka.svc.cluster.local:9092
        consumerGroup: order-service-group
        topic: inventory-reserved-result-topic
        lagThreshold: "50"
        offsetResetPolicy: earliest
    - type: cpu
      metricType: Utilization
      metadata:
        value: "70"

# -----------------------------------------------------------------------------
# Canary release for the order service (the "transfer-like" critical path).
# The chart renders a second `order-...-canary` Deployment carrying
# version: canary, and the Istio VirtualService sends `weight`% of traffic to
# it. Progressive shift = bump weight 20 -> 50 -> 100, then promote by moving
# image.tag to canary.tag and disabling canary. Point canary.tag at the new
# candidate image SHA before enabling in anger; it defaults to the stable tag
# here so the wiring renders against a pullable image.
# -----------------------------------------------------------------------------
canary:
  enabled: true
  weight: 20
  tag: a312007b1ec6df677c275ea1657d399242dd24f5
  replicaCount: 1

externalSecret:
  enabled: true
  targetName: order-service-secrets
  awsSecretName: kt-cloud-cluster/order-service
  keys:
    - secretKey: password
      property: DB_PASSWORD
    - secretKey: postgres-password
      property: DB_PASSWORD

redis:
  enabled: false

postgresql:
  enabled: true
  fullnameOverride: order-postgres
  architecture: standalone
  global:
    security:
      allowInsecureImages: true
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
    tag: "16"
  auth:
    username: order-service
    database: order_db
    existingSecret: order-service-secrets
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: password
  primary:
    persistence:
      enabled: true
      storageClass: ebs-sc
      size: 5Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi

appConfig:
  spring:
    application:
      name: order-service
    datasource:
      url: jdbc:postgresql://order-postgres:5432/order_db?sslmode=disable
      username: order-service
      password: ${DB_PASSWORD}
      driver-class-name: org.postgresql.Driver
    jpa:
      database-platform: org.hibernate.dialect.PostgreSQLDialect
      hibernate:
        ddl-auto: create
      generate-ddl: true
      show-sql: true
    kafka:
      bootstrap-servers: kafka-kafka-bootstrap.kafka.svc.cluster.local:9092
      consumer:
        group-id: order-service-group
        auto-offset-reset: earliest
        key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
        value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      producer:
        key-serializer: org.apache.kafka.common.serialization.StringSerializer
        value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      topic:
        inventory-reserved-result: inventory-reserved-result-topic
        inventory-reserve-request: inventory-reserve-request-topic
  server:
    port: 8080
  grpc:
    server:
      port: 9090
  management:
    endpoints:
      web:
        base-path: /
        exposure:
          include: health,info,prometheus,metrics
        path-mapping:
          health: healthz
    endpoint:
      health:
        show-details: always
        probes:
          enabled: true
        group:
          readiness:
            include: readinessState,db
    prometheus:
      metrics:
        export:
          enabled: true
    metrics:
      tags:
        application: order-service
      distribution:
        percentiles-histogram:
          http.server.requests: true
        slo:
          http.server.requests: 100ms,500ms,1s,2s

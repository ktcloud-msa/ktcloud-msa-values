image:
  repository: kanei0415/ktcloud-msa-order-service
  tag: a312007b1ec6df677c275ea1657d399242dd24f5
  pullPolicy: IfNotPresent

service:
  type: ClusterIP

# -----------------------------------------------------------------------------
# Order is the saga orchestrator and consumes inventory-reserved-result-topic,
# so it scales on that consumer lag via KEDA (HPA disabled below).
# -----------------------------------------------------------------------------
autoscaling:
  enabled: false

keda:
  enabled: true
  minReplicaCount: 2
  maxReplicaCount: 10
  cooldownPeriod: 120
  pollingInterval: 15
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: kafka-kafka-bootstrap.kafka.svc.cluster.local:9092
        consumerGroup: order-service-group
        topic: inventory-reserved-result-topic
        lagThreshold: "50"
        offsetResetPolicy: earliest
    - type: cpu
      metricType: Utilization
      metadata:
        value: "70"

# -----------------------------------------------------------------------------
# Progressive delivery for the order service (the "transfer-like" critical
# path) via Argo Rollouts. The chart renders a Rollout instead of a Deployment;
# the canary advances 20% -> 50% -> 80% -> promote, and after each weight bump
# an AnalysisRun polls the service's 5xx error-rate recording rule in
# Prometheus. If the error rate breaches 5% the Rollout auto-aborts and rolls
# back to the last stable ReplicaSet. KEDA (above) targets the Rollout.
#
# To ship a new build: bump image.tag and let ArgoCD sync — Argo Rollouts then
# drives the staged canary automatically (no weight edits needed). The legacy
# Istio-weighted `canary` block is disabled; Argo owns the canary ReplicaSet.
# -----------------------------------------------------------------------------
rollout:
  enabled: true
  analysis:
    errorRateThreshold: "0.05"
    interval: 60s
    count: 3
    failureLimit: 1

canary:
  enabled: false
  weight: 20
  tag: a312007b1ec6df677c275ea1657d399242dd24f5
  replicaCount: 1

externalSecret:
  enabled: true
  targetName: order-service-secrets
  awsSecretName: kt-cloud-cluster/order-service
  keys:
    - secretKey: password
      property: DB_PASSWORD
    - secretKey: postgres-password
      property: DB_PASSWORD

redis:
  enabled: false

# CloudNativePG HA cluster (1 primary + 2 replicas), managed by the
# cnpg-operator. The chart renders the postgresql.cnpg.io/v1 Cluster and a
# basic-auth ExternalSecret it bootstraps from. App connects via order-postgres-rw.
cnpg:
  enabled: true
  name: order-postgres
  database: order_db
  owner: order-service
  instances: 3

appConfig:
  spring:
    application:
      name: order-service
    datasource:
      url: jdbc:postgresql://order-postgres-rw:5432/order_db?sslmode=disable
      username: order-service
      password: ${DB_PASSWORD}
      driver-class-name: org.postgresql.Driver
    jpa:
      database-platform: org.hibernate.dialect.PostgreSQLDialect
      hibernate:
        ddl-auto: create
      generate-ddl: true
      show-sql: true
    kafka:
      bootstrap-servers: kafka-kafka-bootstrap.kafka.svc.cluster.local:9092
      consumer:
        group-id: order-service-group
        auto-offset-reset: earliest
        key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
        value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      producer:
        key-serializer: org.apache.kafka.common.serialization.StringSerializer
        value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      topic:
        inventory-reserved-result: inventory-reserved-result-topic
        inventory-reserve-request: inventory-reserve-request-topic
  server:
    port: 8080
  grpc:
    server:
      port: 9090
  management:
    endpoints:
      web:
        base-path: /
        exposure:
          include: health,info,prometheus,metrics
        path-mapping:
          health: healthz
    endpoint:
      health:
        show-details: always
        probes:
          enabled: true
        group:
          readiness:
            include: readinessState,db
    prometheus:
      metrics:
        export:
          enabled: true
    metrics:
      tags:
        application: order-service
      distribution:
        percentiles-histogram:
          http.server.requests: true
        slo:
          http.server.requests: 100ms,500ms,1s,2s

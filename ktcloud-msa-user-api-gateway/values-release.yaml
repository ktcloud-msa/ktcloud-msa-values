image:
  repository: kanei0415/ktcloud-msa-user-api-gateway
  tag: e6699d9a29f65f8207d2f1f9134a75c6338368a6
  pullPolicy: IfNotPresent

service:
  type: ClusterIP

externalSecret:
  # Disabled: AWS Secrets Manager stores literal "CHANGE_ME_*" placeholders
  # which makes JWT_SECRET too short for HS256. user-api-gateway-secrets is
  # populated manually in-cluster instead. Re-enable once SM is seeded.
  enabled: false
  targetName: user-api-gateway-secrets
  awsSecretName: kt-cloud-cluster/user-api-gateway

redis:
  enabled: false

postgresql:
  enabled: false

appConfig:
  spring:
    application:
      name: user-api-gateway
  grpc:
    client:
      auth-service:
        address: 'static://auth-service-release.svc.ktcloud-market-msa-release:9090'
        negotiation-type: plaintext
      product-service:
        address: 'static://product-service-release.svc.ktcloud-market-msa-release:9090'
        negotiation-type: plaintext
      order-service:
        address: 'static://order-service-release.svc.ktcloud-market-msa-release:9090'
        negotiation-type: plaintext
      inventory-service:
        address: 'static://inventory-service-release.svc.ktcloud-market-msa-release:9090'
        negotiation-type: plaintext
  jwt:
    secret: ${JWT_SECRET}
  server:
    port: 8080
  management:
    endpoints:
      web:
        base-path: /
        path-mapping:
          health: healthz
    endpoint:
      health:
        show-details: always
  springdoc:
    swagger-ui:
      path: /swagger-ui.html
      groups-order: DESC
      operations-sorter: alpha
    api-docs:
      path: /v3/api-docs

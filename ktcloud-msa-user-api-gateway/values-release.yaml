image:
  repository: kanei0415/ktcloud-msa-user-api-gateway
  tag: 946599ea4e6ec17ab5a0516a1afeb0ed75df32fe
  pullPolicy: IfNotPresent

service:
  type: ClusterIP

# The gateway's JWT SecurityWebFilterChain guards ALL routes, including the
# Actuator health path (/healthz/*), so the kubelet readiness/liveness probes
# come back 401 and the pod never reports Ready even though the app is serving
# fine on :8080. The backend services have no such filter, so their probes pass.
# Disable the HTTP probes here (readiness is degradable by design for the BFF).
# Proper fix lives in the app image: permitAll("/healthz/**") in the gateway's
# SecurityWebFilterChain, or run Actuator on a separate management.server.port.
probes:
  enabled: false

# The gateway is the single north-south entry point (fronted by Traefik/ALB in
# the `traefik` namespace), so its NetworkPolicy must accept ingress from
# outside the app namespace. JWT auth is enforced at the gateway itself.
networkPolicy:
  enabled: true
  allowExternal: true

externalSecret:
  enabled: true
  targetName: user-api-gateway-secrets
  awsSecretName: kt-cloud-cluster/user-api-gateway

# Same JWT secret as auth-service so the gateway can validate tokens it issues.
jwtSecret: pNiKW9c2Z8E5dFmYqRtVgXz3uIoBnH7lTaJkSh1xPyMr46WvUe

redis:
  enabled: false

# The gateway has no database.
cnpg:
  enabled: false

appConfig:
  spring:
    application:
      name: user-api-gateway
    # Redis backing Bucket4j rate limiter (RateLimitAutoConfiguration in
    # common lib gates on spring.data.redis.host). Reuses the existing
    # inventory-redis-master; REDIS_PASSWORD comes from ESO-managed
    # user-api-gateway-secrets (AWS SM key kt-cloud-cluster/user-api-gateway).
    data:
      redis:
        host: inventory-redis-master
        port: 6379
        password: ${REDIS_PASSWORD}
  grpc:
    client:
      auth-service:
        address: 'static://auth-service-release.svc.ktcloud-market-msa-release:9090'
        negotiation-type: plaintext
      product-service:
        address: 'static://product-service-release.svc.ktcloud-market-msa-release:9090'
        negotiation-type: plaintext
      order-service:
        address: 'static://order-service-release.svc.ktcloud-market-msa-release:9090'
        negotiation-type: plaintext
      inventory-service:
        address: 'static://inventory-service-release.svc.ktcloud-market-msa-release:9090'
        negotiation-type: plaintext
  jwt:
    secret: ${JWT_SECRET}
  server:
    port: 8080
  management:
    endpoints:
      web:
        base-path: /
        exposure:
          include: health,info,prometheus,metrics
        path-mapping:
          health: healthz
    endpoint:
      health:
        show-details: always
        probes:
          enabled: true
        # The gateway must stay reachable even if Redis (rate-limiter backing
        # store) is down, so readiness does NOT include redis.
        group:
          readiness:
            include: readinessState
    prometheus:
      metrics:
        export:
          enabled: true
    metrics:
      tags:
        application: user-api-gateway
      distribution:
        percentiles-histogram:
          http.server.requests: true
        slo:
          http.server.requests: 100ms,500ms,1s,2s
  springdoc:
    swagger-ui:
      path: /swagger-ui.html
      groups-order: DESC
      operations-sorter: alpha
    api-docs:
      path: /v3/api-docs
